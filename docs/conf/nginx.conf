# ============================================================
# trade-ingress Nginx 反向代理配置
#
# 外部入口：
#   81.70.59.128:10000/order/*   → 127.0.0.1:8115/trade-ingress/order/*
#   81.70.59.128:10001/payment/* → 127.0.0.1:8115/trade-ingress/payment/*
#
# 部署：将本文件放到 /etc/nginx/conf.d/ 或 include 到 nginx.conf
# 验证：nginx -t && nginx -s reload
# ============================================================

# ------------------- 订单入口 (10000) -------------------
server {
    listen       10000;
    server_name  81.70.59.128;

    # 仅代理 /order/ 前缀，actuator 等其他路径不暴露
    location /order/ {
        proxy_pass http://127.0.0.1:8115/trade-ingress/order/;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 富友推送报文体可能较大
        client_max_body_size 10m;

        # 超时设置（匹配 ingress 侧 socketTimeout）
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# ------------------- 支付入口 (10001) -------------------
server {
    listen       10001;
    server_name  81.70.59.128;

    location /payment/ {
        proxy_pass http://127.0.0.1:8115/trade-ingress/payment/;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 10m;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
