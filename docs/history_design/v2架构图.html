<head>
    <title>富友 SAAS 平台同步架构图 V2</title>
    <meta charset="UTF-8">
    <style>
        :root{
            --surface:#ffffff;--surface-muted:#f5f5f7;--border:#e5e5ea;
            --text:#1d1d1f;--text-muted:#86868b;
            --brand:#6d5efc;--brand-soft:#efedff;
            --accent:#00a3a3;--accent-soft:#e0f5f5;
            --warn:#d97706;--warn-soft:#fef3e2;
            --font-sans:-apple-system,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
            --radius-card:12px;
        }
        :root[data-widget-theme="dark"]{
            --surface:#1c1c1e;--surface-muted:#2c2c2e;--border:#3a3a3c;
            --text:#f5f5f7;--text-muted:#98989d;
            --brand:#8b7dff;--brand-soft:#2a2547;
            --accent:#2dd4bf;--accent-soft:#14302e;
            --warn:#f59e0b;--warn-soft:#3a2a10;
        }
        .widget-root{font-family:var(--font-sans);}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:20px;}
        .card-head{margin-bottom:14px;}
        .card-title{font-size:16px;font-weight:600;color:var(--text);}
        .card-sub{font-size:12px;color:var(--text-muted);margin-top:4px;}
        .card-foot{font-size:12px;color:var(--text-muted);margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap;}
        .lg{display:inline-flex;align-items:center;gap:6px;}
        .lg span{width:22px;height:0;border-top:1.5px solid var(--text-muted);display:inline-block;}
        .lg.dashed span{border-top:1.5px dashed var(--text-muted);}
        .lg.accent span{border-top:1.5px dashed var(--accent);}
        svg{width:100%;height:auto;display:block;overflow:visible;}
        .node{fill:var(--surface);stroke:var(--border);stroke-width:1;}
        .node-focal{fill:var(--brand-soft);stroke:var(--brand);stroke-width:1.5;}
        .node-accent{fill:var(--accent-soft);stroke:var(--accent);stroke-width:1.5;}
        .node-warn{fill:var(--warn-soft);stroke:var(--warn);stroke-width:1.5;}
        .node-ext{fill:var(--surface);stroke:var(--border);stroke-width:1;stroke-dasharray:5 3;}
        .cbg{fill:var(--surface-muted);stroke:var(--border);stroke-width:1;}
        .cyl{fill:var(--surface-muted);stroke:var(--border);stroke-width:1;}
        .conn{fill:none;stroke:var(--text-muted);stroke-width:1.5;}
        .conn-d{stroke-dasharray:5 3;}
        .conn-accent{fill:none;stroke:var(--accent);stroke-width:1.5;stroke-dasharray:5 3;}
        .conn-warn{fill:none;stroke:var(--warn);stroke-width:1.5;stroke-dasharray:5 3;}
        .cap{fill:var(--surface);stroke:var(--border);stroke-width:1;}
        .cap-w{fill:var(--warn-soft);stroke:var(--warn);stroke-width:1;}
        .t-title{font-size:15px;font-weight:600;fill:var(--text);}
        .t-sub{font-size:12px;fill:var(--text-muted);}
        .t-cap{font-size:11px;fill:var(--text);}
        .t-ctitle{font-size:11px;font-weight:700;fill:var(--text-muted);letter-spacing:0.6px;}
        .t-label{font-size:11px;fill:var(--text-muted);}
        .t-num{font-size:11px;font-weight:700;fill:var(--brand);}
        .t-ack{font-size:11px;font-weight:600;fill:var(--warn);}
        #arr path{fill:var(--text-muted);}
        #arr-a path{fill:var(--accent);}
        #arr-w path{fill:var(--warn);}
    </style>
</head>
<body>
<div class="widget-root" data-dynamic-ui-widget data-template="node-flow">
    <div class="card">
        <div class="card-head">
            <div class="card-title">V2 可靠性架构：六链路闭环</div>
            <div class="card-sub">接收 → 投递 → 消费 → 补偿 → 归档 → 查询 · Inbox 事实源 · 双状态字段</div>
        </div>
        <svg viewBox="0 0 760 1060" role="img" aria-label="V2 可靠性架构图">
            <defs>
                <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto"><path d="M1 1 L7 4 L1 7 Z"/></marker>
                <marker id="arr-a" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto"><path d="M1 1 L7 4 L1 7 Z"/></marker>
                <marker id="arr-w" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto"><path d="M1 1 L7 4 L1 7 Z"/></marker>
            </defs>

            <!-- 富友 SAAS -->
            <rect class="node-ext" x="290" y="28" width="180" height="40" rx="20"/>
            <text class="t-title" x="380" y="53" text-anchor="middle">富友 SAAS 平台</text>

            <!-- ① Push Receiver -->
            <rect class="cbg" x="130" y="94" width="500" height="128" rx="12"/>
            <text class="t-ctitle" x="148" y="114">① 接收链路 · Push Receiver</text>
            <rect class="node" x="165" y="124" width="430" height="86" rx="8"/>
            <text class="t-title" x="380" y="146" text-anchor="middle">Push Receiver</text>
            <text class="t-sub" x="380" y="166" text-anchor="middle">验签 MD5 · 生成 event_key · 提取基础字段</text>
            <text class="t-sub" x="380" y="184" text-anchor="middle">写 push_log + push_content（同一 DB 事务）</text>
            <text class="t-ack" x="380" y="202" text-anchor="middle">✓ DB 提交成功后 ACK 返回富友</text>

            <!-- ACK 回环 -->
            <path class="conn conn-d" d="M165,156 H96 V48 H290" marker-end="url(#arr)"/>
            <text class="t-cap" x="88" y="100" text-anchor="middle" transform="rotate(-90 88 100)">ACK 快速返回</text>

            <!-- 分叉到两表 -->
            <path class="conn" d="M380,222 V238 H270 V254" marker-end="url(#arr)"/>
            <path class="conn" d="M380,238 H530 V254" marker-end="url(#arr)"/>

            <!-- push_log 圆柱 -->
            <ellipse class="cyl" cx="270" cy="254" rx="95" ry="9"/>
            <rect x="175" y="254" width="190" height="58" fill="var(--surface-muted)"/>
            <line x1="175" y1="254" x2="175" y2="312" stroke="var(--border)" stroke-width="1"/>
            <line x1="365" y1="254" x2="365" y2="312" stroke="var(--border)" stroke-width="1"/>
            <ellipse class="cyl" cx="270" cy="312" rx="95" ry="9"/>
            <text class="t-title" x="270" y="282" text-anchor="middle">push_log (Inbox)</text>
            <text class="t-sub" x="270" y="300" text-anchor="middle">事件事实源 · 状态字段</text>

            <!-- push_content 圆柱 -->
            <ellipse class="cyl" cx="530" cy="254" rx="95" ry="9"/>
            <rect x="435" y="254" width="190" height="58" fill="var(--surface-muted)"/>
            <line x1="435" y1="254" x2="435" y2="312" stroke="var(--border)" stroke-width="1"/>
            <line x1="625" y1="254" x2="625" y2="312" stroke="var(--border)" stroke-width="1"/>
            <ellipse class="cyl" cx="530" cy="312" rx="95" ry="9"/>
            <text class="t-title" x="530" y="282" text-anchor="middle">push_content</text>
            <text class="t-sub" x="530" y="300" text-anchor="middle">大 JSON 正文 · hash</text>

            <!-- Dispatcher 扫描(虚线) -->
            <path class="conn conn-d" d="M270,321 V366" marker-end="url(#arr)"/>
            <rect class="cap" x="226" y="334" width="88" height="18" rx="9"/>
            <text class="t-cap" x="270" y="347" text-anchor="middle">扫描待投递</text>

            <!-- ② Dispatcher -->
            <rect class="cbg" x="130" y="366" width="500" height="96" rx="12"/>
            <text class="t-ctitle" x="148" y="386">② 投递链路 · Dispatcher</text>
            <rect class="node" x="165" y="398" width="430" height="52" rx="8"/>
            <text class="t-sub" x="380" y="418" text-anchor="middle">扫描 delivery_status=待投递/失败</text>
            <text class="t-sub" x="380" y="438" text-anchor="middle">XADD → 记录 stream_message_id → 更新 DELIVERED</text>

            <!-- XADD -->
            <path class="conn" d="M380,462 V494" marker-end="url(#arr)"/>
            <rect class="cap" x="352" y="470" width="56" height="18" rx="9"/>
            <text class="t-cap" x="380" y="483" text-anchor="middle">XADD</text>

            <!-- Redis Stream (焦点) -->
            <rect class="node-focal" x="210" y="494" width="340" height="56" rx="8"/>
            <text class="t-title" x="380" y="516" text-anchor="middle">Redis Stream</text>
            <text class="t-sub" x="380" y="534" text-anchor="middle">order stream · payment stream</text>

            <!-- XREADGROUP 分两路 -->
            <path class="conn" d="M300,550 V586" marker-end="url(#arr)"/>
            <path class="conn" d="M460,550 V586" marker-end="url(#arr)"/>
            <rect class="cap" x="330" y="558" width="100" height="18" rx="9"/>
            <text class="t-cap" x="380" y="571" text-anchor="middle">XREADGROUP</text>

            <!-- ③ Workers -->
            <rect class="cbg" x="90" y="586" width="580" height="128" rx="12"/>
            <text class="t-ctitle" x="108" y="606">③ 消费链路 · Worker</text>
            <rect class="node" x="120" y="616" width="240" height="88" rx="8"/>
            <text class="t-title" x="240" y="638" text-anchor="middle">Order Worker</text>
            <text class="t-sub" x="240" y="656" text-anchor="middle">消费幂等 · 解析 JSON</text>
            <text class="t-sub" x="240" y="674" text-anchor="middle">UPSERT 业务表 → handle_status=成功</text>
            <text class="t-ack" x="240" y="694" text-anchor="middle">✓ 事务成功后 XACK</text>
            <rect class="node" x="400" y="616" width="240" height="88" rx="8"/>
            <text class="t-title" x="520" y="638" text-anchor="middle">Payment Worker</text>
            <text class="t-sub" x="520" y="656" text-anchor="middle">消费幂等 · 解析 JSON</text>
            <text class="t-sub" x="520" y="674" text-anchor="middle">UPSERT 业务表 → handle_status=成功</text>
            <text class="t-ack" x="520" y="694" text-anchor="middle">✓ 事务成功后 XACK</text>

            <!-- Workers → MySQL 业务表 -->
            <path class="conn" d="M240,704 V722 H380 V732" marker-end="url(#arr)"/>
            <path class="conn" d="M520,704 V722 H380 V732" marker-end="url(#arr)"/>
            <rect class="cap cap-w" x="330" y="712" width="100" height="18" rx="9"/>
            <text class="t-ack" x="380" y="725" text-anchor="middle">XACK(事务后)</text>

            <!-- MySQL 业务表 圆柱 -->
            <ellipse class="cyl" cx="380" cy="732" rx="120" ry="9"/>
            <rect x="260" y="732" width="240" height="60" fill="var(--surface-muted)"/>
            <line x1="260" y1="732" x2="260" y2="792" stroke="var(--border)" stroke-width="1"/>
            <line x1="500" y1="732" x2="500" y2="792" stroke="var(--border)" stroke-width="1"/>
            <ellipse class="cyl" cx="380" cy="792" rx="120" ry="9"/>
            <text class="t-title" x="380" y="760" text-anchor="middle">MySQL 业务表</text>
            <text class="t-sub" x="380" y="778" text-anchor="middle">oms_order · oms_payment_push</text>

            <!-- ⑥ 查询链路: CDC → Doris → Report -->
            <path class="conn" d="M380,801 V828" marker-end="url(#arr)"/>
            <rect class="node" x="300" y="828" width="160" height="34" rx="8"/>
            <text class="t-sub" x="380" y="850" text-anchor="middle">Flink CDC (binlog)</text>
            <path class="conn-accent" d="M380,862 V886" marker-end="url(#arr-a)"/>
            <rect class="node-accent" x="290" y="886" width="180" height="52" rx="8"/>
            <text class="t-title" x="380" y="908" text-anchor="middle">Doris · OLAP</text>
            <text class="t-sub" x="380" y="926" text-anchor="middle">明细模型 + 聚合模型</text>
            <path class="conn" d="M380,938 V962" marker-end="url(#arr)"/>
            <rect class="node" x="290" y="962" width="180" height="40" rx="8"/>
            <text class="t-title" x="380" y="987" text-anchor="middle">Report Service</text>

            <!-- ④ PEL Reclaimer (左侧旁路) -->
            <rect class="node-warn" x="20" y="514" width="110" height="96" rx="8"/>
            <text class="t-ctitle" x="75" y="534" text-anchor="middle">④ 补偿链路</text>
            <text class="t-title" x="75" y="554" text-anchor="middle">PEL Reclaimer</text>
            <text class="t-sub" x="75" y="572" text-anchor="middle">XAUTOCLAIM</text>
            <text class="t-sub" x="75" y="588" text-anchor="middle">&gt;60s 认领重试</text>
            <text class="t-sub" x="75" y="604" text-anchor="middle">超 N 次 → DEAD</text>
            <!-- 认领(虚线) -->
            <path class="conn-warn" d="M130,540 H210" marker-end="url(#arr-w)"/>
            <text class="t-cap" x="170" y="534" text-anchor="middle">认领</text>
            <!-- 重投递(虚线) -->
            <path class="conn-warn" d="M75,610 V640 H120" marker-end="url(#arr-w)"/>
            <text class="t-cap" x="98" y="634" text-anchor="middle">重投递</text>

            <!-- ⑤ Archive Worker (右侧旁路) -->
            <rect class="node-warn" x="630" y="262" width="112" height="104" rx="8"/>
            <text class="t-ctitle" x="686" y="282" text-anchor="middle">⑤ 归档链路</text>
            <text class="t-title" x="686" y="302" text-anchor="middle">Archive Worker</text>
            <text class="t-sub" x="686" y="320" text-anchor="middle">成功+超保留期</text>
            <text class="t-sub" x="686" y="336" text-anchor="middle">10000 条/批</text>
            <text class="t-sub" x="686" y="352" text-anchor="middle">校验 hash</text>
            <!-- 读 content(虚线) -->
            <path class="conn-warn" d="M625,292 H630" marker-end="url(#arr-w)"/>
            <!-- 归档文件 -->
            <path class="conn-warn" d="M686,366 V380" marker-end="url(#arr-w)"/>
            <rect class="node" x="646" y="380" width="80" height="36" rx="4"/>
            <text class="t-sub" x="686" y="403" text-anchor="middle">jsonl.gz</text>
            <!-- 更新归档位置(虚线回写) -->
            <path class="conn-warn" d="M646,360 H630" marker-end="url(#arr-w)"/>
            <text class="t-cap" x="638" y="392" text-anchor="middle">更新archive_file_id</text>

            <!-- 底部: Replay Console + Monitoring -->
            <rect class="node" x="80" y="1010" width="200" height="40" rx="8"/>
            <text class="t-title" x="180" y="1035" text-anchor="middle">Monitoring 监控</text>
            <text class="t-sub" x="180" y="1052" text-anchor="middle">积压/PEL/失败/归档</text>
            <rect class="node" x="480" y="1010" width="200" height="40" rx="8"/>
            <text class="t-title" x="580" y="1035" text-anchor="middle">Replay Console</text>
            <text class="t-sub" x="580" y="1052" text-anchor="middle">人工重放 → Inbox</text>
            <!-- Replay → Inbox 虚线(长) -->
            <path class="conn conn-d" d="M580,1010 V1000 H730 V48 H470" marker-end="url(#arr)"/>

            <!-- 图例 -->
            <g transform="translate(40,992)">
                <line x1="0" y1="0" x2="20" y2="0" stroke="var(--text-muted)" stroke-width="1.5"/>
                <text class="t-label" x="26" y="4">主流程</text>
                <line x1="86" y1="0" x2="106" y2="0" stroke="var(--warn)" stroke-width="1.5" stroke-dasharray="5 3"/>
                <text class="t-label" x="112" y="4">补偿/归档</text>
                <line x1="186" y1="0" x2="206" y2="0" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 3"/>
                <text class="t-label" x="212" y="4">Doris CDC</text>
            </g>
        </svg>
        <div class="card-foot">
            <span class="lg"><span></span>主流程</span>
            <span class="lg dashed" style="color:var(--warn)"><span style="border-top-color:var(--warn)"></span>补偿/归档</span>
            <span class="lg accent"><span></span>Doris CDC</span>
            <span class="lg dashed"><span></span>人工重放</span>
        </div>
    </div>
</div>

</body>
