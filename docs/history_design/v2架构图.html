<head>
    <title>富友 SAAS 平台同步架构图 V2</title>
    <meta charset="UTF-8">
    <style>
        :root{
            --surface:#ffffff;--surface-muted:#f5f5f7;--border:#e5e5ea;
            --text:#1d1d1f;--text-muted:#86868b;
            --brand:#6d5efc;--brand-soft:#efedff;
            --accent:#00a3a3;--accent-soft:#e0f5f5;
            --warn:#d97706;--warn-soft:#fef3e2;
            --ok:#16a34a;--ok-soft:#f0fdf4;
            --font-sans:-apple-system,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
            --radius-card:12px;
        }
        :root[data-widget-theme="dark"]{
            --surface:#1c1c1e;--surface-muted:#2c2c2e;--border:#3a3a3c;
            --text:#f5f5f7;--text-muted:#98989d;
            --brand:#8b7dff;--brand-soft:#2a2547;
            --accent:#2dd4bf;--accent-soft:#14302e;
            --warn:#f59e0b;--warn-soft:#3a2a10;
            --ok:#4ade80;--ok-soft:#0f2e1a;
        }
        .widget-root{font-family:var(--font-sans);}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:20px;}
        .card-head{margin-bottom:14px;}
        .card-title{font-size:16px;font-weight:600;color:var(--text);}
        .card-sub{font-size:12px;color:var(--text-muted);margin-top:4px;}
        .card-foot{font-size:12px;color:var(--text-muted);margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap;}
        .lg{display:inline-flex;align-items:center;gap:6px;}
        .lg span{width:22px;height:0;border-top:1.5px solid var(--text-muted);display:inline-block;}
        .lg.dashed span{border-top:1.5px dashed var(--text-muted);}
        .lg.accent span{border-top:1.5px dashed var(--accent);}
        .lg.warn span{border-top:1.5px dashed var(--warn);}
        .lg.ok span{border-top:1.5px solid var(--ok);}
        svg{width:100%;height:auto;display:block;overflow:visible;}
        .node{fill:var(--surface);stroke:var(--border);stroke-width:1;}
        .node-focal{fill:var(--brand-soft);stroke:var(--brand);stroke-width:1.5;}
        .node-accent{fill:var(--accent-soft);stroke:var(--accent);stroke-width:1.5;}
        .node-warn{fill:var(--warn-soft);stroke:var(--warn);stroke-width:1.5;}
        .node-ok{fill:var(--ok-soft);stroke:var(--ok);stroke-width:1.5;}
        .node-ext{fill:var(--surface);stroke:var(--border);stroke-width:1;stroke-dasharray:5 3;}
        .cbg{fill:var(--surface-muted);stroke:var(--border);stroke-width:1;}
        .cyl{fill:var(--surface-muted);stroke:var(--border);stroke-width:1;}
        .conn{fill:none;stroke:var(--text-muted);stroke-width:1.5;}
        .conn-d{stroke-dasharray:5 3;}
        .conn-accent{fill:none;stroke:var(--accent);stroke-width:1.5;stroke-dasharray:5 3;}
        .conn-warn{fill:none;stroke:var(--warn);stroke-width:1.5;stroke-dasharray:5 3;}
        .conn-ok{fill:none;stroke:var(--ok);stroke-width:1.5;}
        .cap{fill:var(--surface);stroke:var(--border);stroke-width:1;}
        .cap-w{fill:var(--warn-soft);stroke:var(--warn);stroke-width:1;}
        .cap-ok{fill:var(--ok-soft);stroke:var(--ok);stroke-width:1;}
        .cap-brand{fill:var(--brand-soft);stroke:var(--brand);stroke-width:1;}
        .t-title{font-size:15px;font-weight:600;fill:var(--text);}
        .t-sub{font-size:12px;fill:var(--text-muted);}
        .t-cap{font-size:11px;fill:var(--text);}
        .t-ctitle{font-size:11px;font-weight:700;fill:var(--text-muted);letter-spacing:0.6px;}
        .t-label{font-size:11px;fill:var(--text-muted);}
        .t-num{font-size:11px;font-weight:700;fill:var(--brand);}
        .t-ack{font-size:11px;font-weight:600;fill:var(--ok);}
        .t-warn{font-size:11px;font-weight:600;fill:var(--warn);}
        #arr path{fill:var(--text-muted);}
        #arr-a path{fill:var(--accent);}
        #arr-w path{fill:var(--warn);}
        #arr-ok path{fill:var(--ok);}
        #arr-b path{fill:var(--brand);}
    </style>
</head>
<body>
<div class="widget-root" data-dynamic-ui-widget data-template="node-flow">
    <div class="card">
        <div class="card-head">
            <div class="card-title">V2 架构：Storage 内容寻址 · 事件版本驱动 · 双 ACK 闭环</div>
            <div class="card-sub">Ingress 验签+Storage写原文+Event落库+熔断投递 · Pipeline 读原文+版本校验+幂等落库+双ACK · 年度分片</div>
        </div>
        <svg viewBox="0 0 820 1180" role="img" aria-label="V2 架构图">
            <defs>
                <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto"><path d="M1 1 L7 4 L1 7 Z"/></marker>
                <marker id="arr-a" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto"><path d="M1 1 L7 4 L1 7 Z"/></marker>
                <marker id="arr-w" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto"><path d="M1 1 L7 4 L1 7 Z"/></marker>
                <marker id="arr-ok" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto"><path d="M1 1 L7 4 L1 7 Z"/></marker>
                <marker id="arr-b" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto"><path d="M1 1 L7 4 L1 7 Z"/></marker>
            </defs>

            <!-- ===== 富友 SAAS ===== -->
            <rect class="node-ext" x="310" y="20" width="200" height="40" rx="20"/>
            <text class="t-title" x="410" y="45" text-anchor="middle">富友 SAAS 平台</text>

            <!-- ACK 回环 -->
            <path class="conn-ok" d="M310,35 H80 V100" marker-end="url(#arr-ok)"/>
            <rect class="cap-ok" x="30" y="55" width="100" height="18" rx="9"/>
            <text class="t-ack" x="80" y="68" text-anchor="middle">ACK 快速返回</text>

            <!-- ===== ① Ingress 接收链路 ===== -->
            <rect class="cbg" x="110" y="80" width="600" height="180" rx="12"/>
            <text class="t-ctitle" x="128" y="100">① 接收链路 · trade-ingress</text>

            <!-- 验签 -->
            <rect class="node" x="140" y="112" width="160" height="60" rx="8"/>
            <text class="t-title" x="220" y="134" text-anchor="middle">验签</text>
            <text class="t-sub" x="220" y="152" text-anchor="middle">MD5(secret + body)</text>
            <text class="t-sub" x="220" y="168" text-anchor="middle">正则提 keySign · 不重写 JSON</text>

            <!-- StorageWriter -->
            <rect class="node" x="330" y="112" width="180" height="60" rx="8"/>
            <text class="t-title" x="420" y="134" text-anchor="middle">StorageWriter</text>
            <text class="t-sub" x="420" y="152" text-anchor="middle">putIfAbsent 幂等写入</text>
            <text class="t-sub" x="420" y="168" text-anchor="middle">Redis 锁串行化同内容</text>

            <!-- Event 落库 -->
            <rect class="node" x="540" y="112" width="150" height="60" rx="8"/>
            <text class="t-title" x="615" y="134" text-anchor="middle">Event 落库</text>
            <text class="t-sub" x="615" y="152" text-anchor="middle">uk_event_version 幂等</text>
            <text class="t-sub" x="615" y="168" text-anchor="middle">messageVersion=recUpdTm</text>

            <!-- 验签 → StorageWriter → Event -->
            <path class="conn" d="M300,142 H330" marker-end="url(#arr)"/>
            <path class="conn" d="M510,142 H540" marker-end="url(#arr)"/>

            <!-- EventDeliveryService -->
            <rect class="node-focal" x="200" y="190" width="420" height="56" rx="8"/>
            <text class="t-title" x="410" y="212" text-anchor="middle">EventDeliveryService</text>
            <text class="t-sub" x="410" y="230" text-anchor="middle">立即发布 → 1/5/10min 短期重试 → 15min 定时补发(≤2次) → 人工</text>

            <!-- Event → Delivery -->
            <path class="conn" d="M615,172 V190 H410 V190" marker-end="url(#arr)"/>

            <!-- ===== trade_flow 数据库 (Storage + Event 表) ===== -->
            <!-- Storage 圆柱 -->
            <ellipse class="cyl" cx="220" cy="284" rx="100" ry="9"/>
            <rect x="120" y="284" width="200" height="52" fill="var(--surface-muted)"/>
            <line x1="120" y1="284" x2="120" y2="336" stroke="var(--border)" stroke-width="1"/>
            <line x1="320" y1="284" x2="320" y2="336" stroke="var(--border)" stroke-width="1"/>
            <ellipse class="cyl" cx="220" cy="336" rx="100" ry="9"/>
            <text class="t-title" x="220" y="310" text-anchor="middle">trade_storage</text>
            <text class="t-sub" x="220" y="328" text-anchor="middle">100 分片 · SHA-256%100 · BINARY(32)</text>

            <!-- Event 表 圆柱 -->
            <ellipse class="cyl" cx="610" cy="284" rx="110" ry="9"/>
            <rect x="500" y="284" width="220" height="52" fill="var(--surface-muted)"/>
            <line x1="500" y1="284" x2="500" y2="336" stroke="var(--border)" stroke-width="1"/>
            <line x1="720" y1="284" x2="720" y2="336" stroke="var(--border)" stroke-width="1"/>
            <ellipse class="cyl" cx="610" cy="336" rx="110" ry="9"/>
            <text class="t-title" x="610" y="310" text-anchor="middle">trade_order_event</text>
            <text class="t-sub" x="610" y="328" text-anchor="middle">trade_payment_event · acked · redelivery</text>

            <!-- trade_flow 标签 -->
            <text class="t-ctitle" x="415" y="278" text-anchor="middle">MySQL · trade_flow 库</text>

            <!-- Ingress 写 Storage -->
            <path class="conn" d="M420,172 V200 H220 V284" marker-end="url(#arr)"/>
            <!-- Ingress 写 Event -->
            <path class="conn" d="M615,172 V200 V284" marker-end="url(#arr)"/>

            <!-- ===== ② Redis Stream (焦点) ===== -->
            <path class="conn" d="M410,246 V358" marker-end="url(#arr)"/>
            <rect class="cap-brand" x="372" y="346" width="76" height="18" rx="9"/>
            <text class="t-cap" x="410" y="359" text-anchor="middle">XADD</text>

            <rect class="node-focal" x="230" y="364" width="360" height="56" rx="8"/>
            <text class="t-title" x="410" y="386" text-anchor="middle">Redis Stream</text>
            <text class="t-sub" x="410" y="404" text-anchor="middle">stream:order-event · stream:payment-event</text>

            <!-- XREADGROUP -->
            <path class="conn" d="M410,420 V452" marker-end="url(#arr)"/>
            <rect class="cap" x="354" y="424" width="112" height="18" rx="9"/>
            <text class="t-cap" x="410" y="437" text-anchor="middle">XREADGROUP</text>

            <!-- ===== ③ Pipeline 消费链路 ===== -->
            <rect class="cbg" x="60" y="452" width="700" height="200" rx="12"/>
            <text class="t-ctitle" x="78" y="472">③ 消费链路 · trade-pipeline</text>

            <!-- StorageReader -->
            <rect class="node" x="90" y="484" width="170" height="70" rx="8"/>
            <text class="t-title" x="175" y="506" text-anchor="middle">StorageReader</text>
            <text class="t-sub" x="175" y="524" text-anchor="middle">双键定位 (storageId+sha256)</text>
            <text class="t-sub" x="175" y="540" text-anchor="middle">四元组一致性校验</text>

            <!-- FuiouOrderParser -->
            <rect class="node" x="290" y="484" width="180" height="70" rx="8"/>
            <text class="t-title" x="380" y="506" text-anchor="middle">FuiouOrderParser</text>
            <text class="t-sub" x="380" y="524" text-anchor="middle">解析 JSON → OrderAggregate</text>
            <text class="t-sub" x="380" y="540" text-anchor="middle">messageVersion=recUpdTm 校验</text>

            <!-- OrderPersistService -->
            <rect class="node" x="500" y="484" width="180" height="70" rx="8"/>
            <text class="t-title" x="590" y="506" text-anchor="middle">OrderPersistService</text>
            <text class="t-sub" x="590" y="524" text-anchor="middle">版本比较 + CAS update</text>
            <text class="t-sub" x="590" y="540" text-anchor="middle">子表全量删除重建</text>

            <!-- Reader → Parser → Persist -->
            <path class="conn" d="M260,519 H290" marker-end="url(#arr)"/>
            <path class="conn" d="M470,519 H500" marker-end="url(#arr)"/>

            <!-- 双 ACK 行 -->
            <rect class="node-ok" x="180" y="574" width="220" height="56" rx="8"/>
            <text class="t-title" x="290" y="596" text-anchor="middle">ACK Ingress</text>
            <text class="t-sub" x="290" y="614" text-anchor="middle">HTTP POST /event/ack</text>
            <text class="t-sub" x="290" y="628" text-anchor="middle">acked=1</text>

            <rect class="node-ok" x="440" y="574" width="220" height="56" rx="8"/>
            <text class="t-title" x="550" y="596" text-anchor="middle">XACK Redis</text>
            <text class="t-sub" x="550" y="614" text-anchor="middle">消费组 ACK</text>
            <text class="t-sub" x="550" y="628" text-anchor="middle">消息离开 PEL</text>

            <!-- Persist → ACK Ingress → XACK -->
            <path class="conn-ok" d="M590,554 V574" marker-end="url(#arr-ok)"/>
            <path class="conn-ok" d="M400,602 H440" marker-end="url(#arr-ok)"/>

            <!-- ACK 回 Ingress (长虚线) -->
            <path class="conn-ok conn-d" d="M290,574 V440 H150 V246" marker-end="url(#arr-ok)"/>
            <text class="t-ack" x="135" y="400" text-anchor="middle" transform="rotate(-90 135 400)">HTTP ACK → Ingress</text>

            <!-- ===== ④ Pipeline 业务表 (年度分片) ===== -->
            <path class="conn" d="M590,554 V652 V672" marker-end="url(#arr)"/>
            <text class="t-ctitle" x="415" y="666" text-anchor="middle">MySQL · trade_pipeline 库</text>

            <!-- oms_order_YYYY -->
            <ellipse class="cyl" cx="210" cy="680" rx="100" ry="9"/>
            <rect x="110" y="680" width="200" height="52" fill="var(--surface-muted)"/>
            <line x1="110" y1="680" x2="110" y2="732" stroke="var(--border)" stroke-width="1"/>
            <line x1="310" y1="680" x2="310" y2="732" stroke="var(--border)" stroke-width="1"/>
            <ellipse class="cyl" cx="210" cy="732" rx="100" ry="9"/>
            <text class="t-title" x="210" y="706" text-anchor="middle">oms_order_YYYY</text>
            <text class="t-sub" x="210" y="724" text-anchor="middle">年度分片 · order_create_time</text>

            <!-- oms_order_item_YYYY_00~15 -->
            <ellipse class="cyl" cx="610" cy="680" rx="120" ry="9"/>
            <rect x="490" y="680" width="240" height="52" fill="var(--surface-muted)"/>
            <line x1="490" y1="680" x2="490" y2="732" stroke="var(--border)" stroke-width="1"/>
            <line x1="730" y1="680" x2="730" y2="732" stroke="var(--border)" stroke-width="1"/>
            <ellipse class="cyl" cx="610" cy="732" rx="120" ry="9"/>
            <text class="t-title" x="610" y="706" text-anchor="middle">oms_order_item_YYYY_00~15</text>
            <text class="t-sub" x="610" y="724" text-anchor="middle">年度+Hash · order_no%16</text>

            <!-- spec + package (小) -->
            <text class="t-sub" x="410" y="750" text-anchor="middle">oms_order_item_spec_YYYY (Hint) · oms_order_package_item_YYYY</text>

            <!-- ===== ⑤ 熔断器 (左侧旁路) ===== -->
            <rect class="node-warn" x="10" y="200" width="90" height="130" rx="8"/>
            <text class="t-ctitle" x="55" y="220" text-anchor="middle">熔断器</text>
            <text class="t-sub" x="55" y="238" text-anchor="middle">CLOSED</text>
            <text class="t-warn" x="55" y="252" text-anchor="middle">↓ 阈值</text>
            <text class="t-sub" x="55" y="266" text-anchor="middle" style="fill:var(--warn)">OPEN</text>
            <text class="t-warn" x="55" y="280" text-anchor="middle">↓ 健康</text>
            <text class="t-sub" x="55" y="294" text-anchor="middle">HALF_OPEN</text>
            <text class="t-sub" x="55" y="312" text-anchor="middle">DB 租约</text>
            <text class="t-sub" x="55" y="326" text-anchor="middle">防并发恢复</text>
            <!-- 熔断 → Ingress -->
            <path class="conn-warn" d="M100,265 H140" marker-end="url(#arr-w)"/>

            <!-- ===== ⑥ PEL 恢复 (右侧旁路) ===== -->
            <rect class="node-warn" x="730" y="380" width="80" height="100" rx="8"/>
            <text class="t-ctitle" x="770" y="400" text-anchor="middle">PEL 恢复</text>
            <text class="t-sub" x="770" y="418" text-anchor="middle">XCLAIM</text>
            <text class="t-sub" x="770" y="434" text-anchor="middle">&gt;1min 认领</text>
            <text class="t-sub" x="770" y="450" text-anchor="middle">仅进程中断</text>
            <text class="t-sub" x="770" y="466" text-anchor="middle">不无限重试</text>
            <!-- PEL → Stream -->
            <path class="conn-warn" d="M730,420 H590" marker-end="url(#arr-w)"/>

            <!-- ===== ⑦ 审计日志 ===== -->
            <rect class="cbg" x="110" y="770" width="600" height="70" rx="12"/>
            <text class="t-ctitle" x="128" y="790">审计日志</text>
            <rect class="node" x="130" y="798" width="250" height="32" rx="6"/>
            <text class="t-sub" x="255" y="819" text-anchor="middle">ingest_failure_log (Ingress 侧)</text>
            <rect class="node" x="430" y="798" width="260" height="32" rx="6"/>
            <text class="t-sub" x="560" y="819" text-anchor="middle">pipeline_order_event_log (Pipeline 侧)</text>

            <!-- ===== ⑧ CDC → Doris → Report (预留) ===== -->
            <path class="conn conn-d" d="M410,840 V866" marker-end="url(#arr)"/>
            <text class="t-cap" x="445" y="856" text-anchor="middle">预留</text>
            <rect class="node" x="320" y="866" width="180" height="34" rx="8"/>
            <text class="t-sub" x="410" y="888" text-anchor="middle">Flink CDC (binlog) · 预留</text>
            <path class="conn-accent" d="M410,900 V924" marker-end="url(#arr-a)"/>
            <rect class="node-accent" x="310" y="924" width="200" height="52" rx="8"/>
            <text class="t-title" x="410" y="946" text-anchor="middle">Doris · OLAP · 预留</text>
            <text class="t-sub" x="410" y="964" text-anchor="middle">明细模型 + 聚合模型</text>
            <path class="conn" d="M410,976 V1000" marker-end="url(#arr)"/>
            <rect class="node" x="310" y="1000" width="200" height="40" rx="8"/>
            <text class="t-title" x="410" y="1025" text-anchor="middle">Report Service · 预留</text>

            <!-- ===== 底部: 运维 ===== -->
            <rect class="node" x="80" y="1060" width="200" height="40" rx="8"/>
            <text class="t-title" x="180" y="1085" text-anchor="middle">Monitoring 监控</text>
            <text class="t-sub" x="180" y="1100" text-anchor="middle">积压/PEL/熔断/版本冲突</text>

            <rect class="node" x="540" y="1060" width="200" height="40" rx="8"/>
            <text class="t-title" x="640" y="1085" text-anchor="middle">Replay Console</text>
            <text class="t-sub" x="640" y="1100" text-anchor="middle">人工补发 → Ingress</text>
            <!-- Replay → Ingress 虚线 -->
            <path class="conn conn-d" d="M640,1060 V1050 H800 V40 H510" marker-end="url(#arr)"/>

            <!-- ===== 图例 ===== -->
            <g transform="translate(40,1140)">
                <line x1="0" y1="0" x2="20" y2="0" stroke="var(--text-muted)" stroke-width="1.5"/>
                <text class="t-label" x="26" y="4">主流程</text>
                <line x1="86" y1="0" x2="106" y2="0" stroke="var(--ok)" stroke-width="1.5"/>
                <text class="t-label" x="112" y="4">ACK 闭环</text>
                <line x1="182" y1="0" x2="202" y2="0" stroke="var(--warn)" stroke-width="1.5" stroke-dasharray="5 3"/>
                <text class="t-label" x="208" y="4">补偿/熔断</text>
                <line x1="288" y1="0" x2="308" y2="0" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 3"/>
                <text class="t-label" x="314" y="4">Doris CDC</text>
                <line x1="394" y1="0" x2="414" y2="0" stroke="var(--text-muted)" stroke-width="1.5" stroke-dasharray="5 3"/>
                <text class="t-label" x="420" y="4">人工/预留</text>
            </g>
        </svg>
        <div class="card-foot">
            <span class="lg"><span></span>主流程</span>
            <span class="lg ok" style="color:var(--ok)"><span style="border-top-color:var(--ok)"></span>ACK 闭环</span>
            <span class="lg warn" style="color:var(--warn)"><span style="border-top-color:var(--warn)"></span>补偿/熔断</span>
            <span class="lg accent"><span></span>Doris CDC</span>
            <span class="lg dashed"><span></span>人工/预留</span>
        </div>
    </div>
</div>

</body>
