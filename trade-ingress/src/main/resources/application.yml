server:
  port: 8115
  servlet:
    context-path: /trade-ingress

spring:
  application:
    name: trade-ingress
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mtx.trade.ingress.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl #org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

global-id:
  enabled: true
  snowflake:
    datacenter-id: ${GLOBAL_ID_DATACENTER_ID:1}
    worker-id: ${GLOBAL_ID_WORKER_ID:1}
    max-clock-backward-ms: 5
  domains:
    storage:
      independent: true
      datacenter-id: ${STORAGE_ID_DATACENTER_ID:2}
      worker-id: ${STORAGE_ID_WORKER_ID:1}

trade:
  ingress:
    storage-write:
      lock-wait: 5s
      # MySQL socketTimeout 为10分钟；租约覆盖单次写入的最大预期耗时，并预留1分钟释放窗口。
      lock-lease: 11m
    event-delivery:
      # 首次发布失败后最多短重试2次；历史遗漏统一由 Pipeline 未 ACK 补拉收敛。
      retry-delays: 1m,2m
      realtime-grace-period: 30s
      circuit:
        enabled: true
        failure-window: 1m
        failure-threshold: 10
        health-check-delay: 30s
        scheduler-delay-ms: 30000
        health-success-threshold: 2
        recovery-lease: 2m
  storage:
    local:
      enabled: true
      sql-show: false
  stream:
    order-event-key: stream:order-event
    payment-event-key: stream:payment-event
    order-consumer-group: trade-pipeline-order
    payment-consumer-group: trade-pipeline-payment
    # 约 7 天峰值缓冲；XADD 使用 MAXLEN~ 原子兜底，正常消费后还会 XDEL。
    max-length: ${TRADE_STREAM_MAX_LENGTH:1000000}
    high-watermark: ${TRADE_STREAM_HIGH_WATERMARK:900000}
    low-watermark: ${TRADE_STREAM_LOW_WATERMARK:700000}
    publish-rate-per-second: ${TRADE_STREAM_PUBLISH_RPS:2000}
  thirdparty:
    fuiou:
      order-payload:
        # Jackson JSON Pointer；按富友实际报文字段调整
        event-key-pointer: /keySign
        message-version-pointer: /recUpdTm # 订单最近完成时间	时间戳(毫秒)
      payment-payload:
        event-key-pointer: /paySsn
        message-version-pointer: /payTm
        zone-id: Asia/Shanghai
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mtx.trade: info
    org.springframework.web: info
