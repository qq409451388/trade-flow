server:
  port: 8115
  servlet:
    context-path: /trade-ingress

spring:
  application:
    name: trade-ingress
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mtx.trade.ingress.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl #org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

global-id:
  enabled: true
  snowflake:
    datacenter-id: ${GLOBAL_ID_DATACENTER_ID:1}
    worker-id: ${GLOBAL_ID_WORKER_ID:1}
    max-clock-backward-ms: 5
  domains:
    storage:
      independent: true
      datacenter-id: ${STORAGE_ID_DATACENTER_ID:2}
      worker-id: ${STORAGE_ID_WORKER_ID:1}

trade:
  ingress:
    storage-write:
      lock-wait: 5s
      # MySQL socketTimeout 为10分钟；租约覆盖单次写入的最大预期耗时，并预留1分钟释放窗口。
      lock-lease: 11m
    event-delivery:
      retry-delays: 1m,2m,5m
      stale-after: 15m
      scan-cron: "0 */10 * * * *"
      batch-size: 500
      max-batches: 20
      max-auto-redeliveries: 2
      scan-lock-lease: 14m # 多个 Ingress 实例会同时触发定时任务，但只有取得 Redis 锁的实例执行扫描。设置为14分钟是因为扫描间隔为15分钟
      circuit:
        enabled: true
        failure-window: 1m
        failure-threshold: 10
        health-check-delay: 30s
        scheduler-delay-ms: 30000
        health-success-threshold: 2
        pipeline-failure-threshold: 2
        recovery-lease: 2m
        state-cache-ttl: 5s
        recovery-batch-size: 100
        pipeline-readiness-url: ${PIPELINE_READINESS_URL:http://127.0.0.1:8083/trade-pipeline/readiness/event-consumer}
        readiness-connect-timeout: 3s
        readiness-read-timeout: 5s
  storage:
    local:
      enabled: true
      sql-show: false
  stream:
    order-event-key: stream:order-event
    payment-event-key: stream:payment-event
    # 约 7 天峰值缓冲；XADD 使用 MAXLEN~ 原子兜底，正常消费后还会 XDEL。
    max-length: ${TRADE_STREAM_MAX_LENGTH:1000000}
  thirdparty:
    fuiou:
      order-payload:
        # Jackson JSON Pointer；按富友实际报文字段调整
        event-key-pointer: /keySign
        message-version-pointer: /recUpdTm # 订单最近完成时间	时间戳(毫秒)
      payment-payload:
        event-key-pointer: /paySsn
        message-version-pointer: /payTm
        zone-id: Asia/Shanghai
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mtx.trade: info
    org.springframework.web: info
