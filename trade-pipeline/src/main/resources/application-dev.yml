server:
  port: 8083
  servlet:
    context-path: /trade-pipeline

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/trade_pipeline?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password:
  data:
    redis:
      host: localhost
      port: 6379
      database: 5
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

logging:
  level:
    com.mtx.trade: info
    org.springframework.web: info

trade:
  storage:
    local:
      sql-show: false
    datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/trade_flow?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root
      password:
      hikari:
        maximum-pool-size: 5
        minimum-idle: 1
        connection-timeout: 30000
        read-only: true
