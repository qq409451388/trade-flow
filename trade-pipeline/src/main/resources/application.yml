spring:
  application:
    name: trade-pipeline
  servlet:
    context-path: /trade-pipeline
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  task:
    scheduling:
      pool:
        size: 4

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mtx.trade.pipeline.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

global-id:
  enabled: true
  snowflake:
    datacenter-id: ${PIPELINE_ID_DATACENTER_ID:1}
    worker-id: ${PIPELINE_ID_WORKER_ID:2}
    # 小幅NTP/宿主机校时期间暂停发号并等待追平；超过1秒仍快速失败。
    max-clock-backward-ms: ${SNOWFLAKE_MAX_CLOCK_BACKWARD_MS:1000}

trade:
  pipeline:
    sharding:
      # 这里只登记已经创建物理表的年份；新增年份时必须先执行建表 SQL，再追加配置。
      years:
        - 2026
        - 2027
      order-item-shard-count: 16
      sql-show: false
    order-event-consumer:
      enabled: true
      stream-key: stream:order-event
      group: trade-pipeline-order
      consumer-name: ${PIPELINE_ORDER_CONSUMER_NAME:pipeline-order-1}
      batch-size: 100
      # Redis读取保持单线程；业务按 sourceSystem + eventKey 分配到固定worker，保证同订单有序。
      worker-count: ${PIPELINE_ORDER_WORKER_COUNT:16}
      worker-queue-capacity: ${PIPELINE_ORDER_WORKER_QUEUE_CAPACITY:1250}
      block-timeout: 2s
      listener-watchdog-delay: 5000
      reclaim-delay: 30000
      pending-min-idle: 1m
      ingress-ack-url: ${INGRESS_ACK_URL:http://127.0.0.1:8115/trade-ingress/event/ack}
      ingress-batch-ack-url: ${INGRESS_BATCH_ACK_URL:http://127.0.0.1:8115/trade-ingress/event/batch-ack}
      ingress-ack-connect-timeout: 3s
      ingress-ack-read-timeout: 5s
      ingress-unacked-url: ${INGRESS_UNACKED_URL:http://127.0.0.1:8115/trade-ingress/event/unacked}
    payment-event-consumer:
      enabled: true
      stream-key: stream:payment-event
      group: trade-pipeline-payment
      consumer-name: ${PIPELINE_PAYMENT_CONSUMER_NAME:pipeline-payment-1}
      batch-size: 100
      worker-count: ${PIPELINE_PAYMENT_WORKER_COUNT:8}
      worker-queue-capacity: ${PIPELINE_PAYMENT_WORKER_QUEUE_CAPACITY:1250}
      block-timeout: 2s
      listener-watchdog-delay: 5000
      reclaim-delay: 30000
      pending-min-idle: 1m
    unacked-event-pull:
      enabled: true
      initial-delay-ms: 60000
      fixed-delay-ms: 60000
      batch-size: 500
      max-batches-per-run: 100
      parallelism: 4
      terminal-failure-attempts: 3
      max-run-duration: 10m
      lease-duration: 15m
    performance-monitoring:
      enabled: true
      # 最近5分钟，每5秒一条紧凑样本；单次响应即可交给AI分析完整趋势。
      sample-interval-ms: ${PIPELINE_PERFORMANCE_SAMPLE_INTERVAL_MS:5000}
      history-size: ${PIPELINE_PERFORMANCE_HISTORY_SIZE:60}
      order-target-rps: ${PIPELINE_ORDER_TARGET_RPS:100}
      payment-target-rps: ${PIPELINE_PAYMENT_TARGET_RPS:100}
      queue-warning-percent: 50
      cpu-warning-percent: 80
      data-source-warning-percent: 90
    fuiou-order:
      zone-id: Asia/Shanghai
    fuiou-payment:
      zone-id: Asia/Shanghai
      year-boundary-window: 3h
  storage:
    local:
      enabled: true
      sql-show: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
