spring:
  application:
    name: trade-pipeline
  servlet:
    context-path: /trade-pipeline
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  task:
    scheduling:
      pool:
        size: 4

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mtx.trade.pipeline.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

global-id:
  enabled: true
  snowflake:
    datacenter-id: ${PIPELINE_ID_DATACENTER_ID:1}
    worker-id: ${PIPELINE_ID_WORKER_ID:2}
    max-clock-backward-ms: 5

trade:
  pipeline:
    sharding:
      # 这里只登记已经创建物理表的年份；新增年份时必须先执行建表 SQL，再追加配置。
      years:
        - 2026
        - 2027
      order-item-shard-count: 16
      sql-show: false
    order-event-consumer:
      enabled: true
      stream-key: stream:order-event
      group: trade-pipeline-order
      consumer-name: ${PIPELINE_ORDER_CONSUMER_NAME:pipeline-order-1}
      batch-size: 100
      block-timeout: 2s
      listener-watchdog-delay: 5000
      reclaim-delay: 30000
      pending-min-idle: 1m
      ingress-ack-url: ${INGRESS_ACK_URL:http://127.0.0.1:8115/trade-ingress/event/ack}
      ingress-ack-connect-timeout: 3s
      ingress-ack-read-timeout: 5s
      ingress-exhausted-url: ${INGRESS_EXHAUSTED_URL:http://127.0.0.1:8115/trade-ingress/event/redelivery-exhausted}
    payment-event-consumer:
      enabled: true
      stream-key: stream:payment-event
      group: trade-pipeline-payment
      consumer-name: ${PIPELINE_PAYMENT_CONSUMER_NAME:pipeline-payment-1}
      batch-size: 100
      block-timeout: 2s
      listener-watchdog-delay: 5000
      reclaim-delay: 30000
      pending-min-idle: 1m
    exhausted-event-pull:
      enabled: true
      initial-delay-ms: 60000
      fixed-delay-ms: 60000
      batch-size: 500
      max-batches-per-run: 100
      parallelism: 4
      terminal-failure-attempts: 3
      max-run-duration: 10m
      lease-duration: 15m
    fuiou-order:
      zone-id: Asia/Shanghai
    fuiou-payment:
      zone-id: Asia/Shanghai
      year-boundary-window: 3h
  storage:
    local:
      enabled: true
      sql-show: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
